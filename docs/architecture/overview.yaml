id: obsidian-llm-wiki
name: LLM Wiki Obsidian Plugin
version: "0.1.62"
description: >
  Obsidian-плагин для ведения компаундируемой базы знаний на базе LLM.
  Запускает AI-агента (Claude CLI или нативный OpenAI-совместимый LLM),
  отображает прогресс в боковой панели в реальном времени.

language: TypeScript
runtime: Electron (Obsidian)
build_tool: esbuild
entry_point: src/main.ts
output: main.js (CJS, ES2022)

patterns:
  - name: Layered Architecture
    layers: [presentation, application, domain, infrastructure]
  - name: Event-Driven (AsyncGenerator)
    description: >
      Поток событий RunEvent передаётся от runner/phases к view через AsyncGenerator.
  - name: Strategy (Backend)
    description: >
      ClaudeCliClient и OpenAI (native) — взаимозаменяемые LlmClient реализации.
  - name: Single-Flight
    description: >
      WikiController отклоняет параллельные операции через флаг this.current.

backends:
  - id: claude-agent
    description: Запускает iclaude.sh как дочерний процесс, парсит stream-json stdout
    client: ClaudeCliClient
  - id: native-agent
    description: Обращается к OpenAI-совместимому API (Ollama, OpenAI)
    client: openai npm package

operations:
  - id: ingest
    description: Извлечение сущностей из файла, обновление wiki-страниц
    default_timeout_sec: 300
  - id: query
    description: Ответ на вопрос по базе знаний
    default_timeout_sec: 300
  - id: query-save
    description: Ответ на вопрос с сохранением результата в vault
    default_timeout_sec: 300
  - id: lint
    description: Проверка качества wiki-страниц домена
    default_timeout_sec: 900
  - id: fix
    description: Автоматическое исправление по результату lint
    default_timeout_sec: 900
  - id: init
    description: Начальная инициализация домена из source_paths
    default_timeout_sec: 3600
  - id: chat
    description: Интерактивный диалог с агентом (контекст lint/query)
    default_timeout_sec: 900
  - id: format
    description: >
      Анализ открытой не-wiki markdown-страницы, генерация preview в !Temp/,
      итерация через чат, Apply/Cancel. Жёсткий инвариант: запрещено
      добавлять/удалять факты или искажать смысл — только перефраз.
    default_timeout_sec: 600

key_constraints:
  - Single-flight: одновременно разрешена только одна операция
  - History limit: 20 записей в settings.json (компромисс UX vs размер)
  - Wiki domains: источник истины — DomainEntry[] в settings (персистируется Obsidian)
  - Source paths: consolidateSourcePaths() убирает дубли и поглощённые потомки
  - Mobile: только query/query-save; backend форсится в native-agent
  - Per-device overlay: backend, agentLogEnabled, claudeAgent.{model,allowedTools},
    nativeAgent.{baseUrl,apiKey,model,temperature,topP,numCtx} живут в local.json
    (не синхронизируются между устройствами); resolveEffective(s, l) сливает overlay
    поверх settings перед использованием. apiKey scrub-ится из data.json миграцией.
  - Node-only API: node:fs/node:path вызываются через require() (esbuild оставляет
    как CJS-require для external'ов); await import("node:*") — баг (URL fetch в Electron).
  - Логи: agent.jsonl + dev.jsonl пишутся через VaultTools.adapter (работает на mobile).
  - Format-инвариант: runFormat возвращает JSON {report, formatted}; перед записью
    temp-файла missingTokens() сверяет значимые токены (числа, URL, имена,
    code identifiers) исходника с форматированным текстом. Apply дисейблится в UI
    при непустом списке потерянных токенов.
  - Format I/O: temp хранится в !Wiki/-независимой папке !Temp/<basename>.formatted.md;
    Apply читает temp → перезаписывает оригинал → удаляет temp; Cancel удаляет temp.
    Файлы внутри wiki-домена (по domainWikiFolder) НЕ форматируются — controller
    показывает ConfirmModal с предложением запустить ingest из wiki_sources.

platforms:
  desktop:
    operations: [ingest, query, query-save, lint, fix, init, chat, format]
    backends: [claude-agent, native-agent]
  mobile:
    operations: [query, query-save]
    backends: [native-agent]
    notes: >
      Платформа определяется через Obsidian.Platform.isMobile.
      На mobile: ClaudeCliClient недоступен (нет node:child_process); десктопные
      команды ingest/lint/init не регистрируются. В loadSettings()
      backend=claude-agent → native-agent (one-time migration), perOperation +
      devMode принудительно отключаются. Settings UI скрывает per-operation,
      dev-mode и iclaudePath блоки. dispatch() и dispatchChat() отбрасывают
      не-query операции через requireNativeAgent precheck.

      HTTP: OpenAI SDK получает кастомный fetch — mobileFetch (src/mobile-fetch.ts)
      на основе Obsidian requestUrl (обход CORS для https://ollama.com/v1 и пр.).
      Streaming не поддерживается → query.ts автоматически фолбэчит на
      non-streaming запрос при ошибке.

      Логи: agent.jsonl + dev.jsonl пишутся через VaultTools.adapter (vault),
      доступны и на mobile.
